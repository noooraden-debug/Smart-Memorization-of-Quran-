<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشيخ الافتراضي - النسخة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0ea5e9; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --glass-bg: rgba(17, 24, 39, 0.75); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #020617 100%);
            color: white; min-height: 100vh; overflow-x: hidden;
        }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.4; }
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 25px rgba(14, 165, 233, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }
        .mic-active { animation: pulse-ring 2s infinite; background-color: var(--primary); border-color: #38bdf8 !important; }
        .word-correct { color: #34d399; text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .hidden-ayah { filter: blur(14px) opacity(0.8); transition: all 0.4s ease; cursor: pointer; user-select: none; }
        .hidden-ayah:hover { filter: blur(4px) opacity(1); }
        select option { background-color: #0f172a; color: white; }
        
        /* شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="antialiased py-8 px-4">

    <div class="container mx-auto max-w-6xl">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 glass-panel p-5 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center text-3xl shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-book-quran"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-l from-cyan-300 to-blue-500">الشيخ الافتراضي</h1>
                    <p class="text-sm text-gray-300 mt-1">تسميع مستمر، تتبع الإنجازات، وحفظ التقدم</p>
                </div>
            </div>
            
            <div class="w-full md:w-auto flex flex-col sm:flex-row items-center gap-3 bg-gray-800/60 p-2 rounded-xl border border-gray-700">
                <div class="flex items-center w-full sm:w-auto">
                    <label for="sura-select" class="text-gray-300 font-medium mr-2 whitespace-nowrap"><i class="fa-solid fa-list mr-1"></i> السورة:</label>
                    <select id="sura-select" onchange="loadSurah()" class="bg-gray-900 border-none rounded-lg p-2 text-white outline-none focus:ring-2 focus:ring-cyan-500 w-full md:w-48 cursor-pointer">
                    </select>
                </div>
                <button onclick="nextSurahDirect()" class="w-full sm:w-auto px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white font-medium rounded-lg transition flex items-center justify-center gap-2 text-sm shadow-md shadow-cyan-600/20 whitespace-nowrap">
                    السورة التالية <i class="fa-solid fa-circle-arrow-left"></i>
                </button>
            </div>
        </header>

        <div class="mb-6 flex justify-end">
            <button onclick="saveBookmark()" class="px-5 py-2.5 bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold rounded-xl shadow-lg shadow-orange-600/20 transition flex items-center gap-2 text-sm">
                <i class="fa-solid fa-thumbtack animate-bounce"></i> 📌 وضع علامة لحفظ مكان التوقف الحالي
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-panel p-6 relative overflow-hidden flex flex-col h-full">
                    
                    <div class="flex justify-between items-center mb-4 bg-gray-900/80 p-3 rounded-xl border border-gray-700/50 shadow-inner">
                        <button onclick="changeAyah(-1)" class="px-4 py-2 bg-gray-800 text-gray-300 rounded-lg hover:bg-gray-700 hover:text-white transition"><i class="fa-solid fa-chevron-right mr-1"></i> السابق</button>
                        <div class="text-center font-bold text-cyan-400 text-lg" id="sura-info">جاري التحميل...</div>
                        <button onclick="changeAyah(1)" class="px-4 py-2 bg-gray-800 text-gray-300 rounded-lg hover:bg-gray-700 hover:text-white transition">التالي <i class="fa-solid fa-chevron-left ml-1"></i></button>
                    </div>

                    <!-- شريط التقدم التفاعلي -->
                    <div class="w-full bg-gray-800 rounded-full h-1.5 mb-6 border border-gray-700/50 overflow-hidden">
                        <div id="progress-bar-fill" class="bg-gradient-to-l from-cyan-400 to-blue-600 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>

                    <div class="text-center my-auto p-8 rounded-2xl transition-all duration-500 flex items-center justify-center border border-transparent" id="ayah-container">
                        <h3 class="quran-text text-3xl md:text-5xl leading-loose font-bold" id="target-ayah">...</h3>
                    </div>

                    <div class="mt-auto pt-6 border-t border-gray-800">
                        <div class="p-5 bg-gray-900/60 rounded-xl border border-gray-700/50 min-h-[120px] shadow-inner relative">
                            <div class="absolute -top-3 right-4 bg-gray-800 px-3 py-1 rounded-full text-xs text-gray-400 font-bold border border-gray-700"><i class="fa-solid fa-wave-square mr-1 text-cyan-500"></i> ما يسمعه الشيخ:</div>
                            <p class="quran-text text-2xl mt-2 leading-relaxed text-gray-200" id="user-speech-output">...</p>
                        </div>

                        <div class="mt-6 flex flex-col items-center gap-4">
                            <button id="mic-btn" onclick="toggleListening()" class="w-20 h-20 rounded-full bg-gray-800 border-2 border-gray-600 flex items-center justify-center text-3xl transition-all duration-300 hover:border-cyan-400 relative z-10">
                                <i class="fa-solid fa-microphone text-gray-400" id="mic-icon"></i>
                            </button>
                            <span id="mic-status" class="text-sm font-medium text-gray-400 bg-gray-800/50 px-4 py-1.5 rounded-full">اضغط على الميكروفون وابدأ القراءة</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <!-- خيارات المساعدة -->
                <div class="glass-panel p-6">
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-700/50 pb-3"><i class="fa-solid fa-toolbox mr-2 text-purple-400"></i> خيارات المساعدة</h3>
                    <div class="space-y-3">
                        <button onclick="playRealAudio()" class="w-full text-right p-3 rounded-xl bg-gray-800/80 hover:bg-gray-700 transition border border-gray-700 hover:border-blue-500/50 flex justify-between items-center group">
                            <span class="text-gray-300 group-hover:text-white">الاستماع للآية الصحيحة</span> 
                            <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center group-hover:bg-blue-500/40">
                                <i class="fa-solid fa-play text-xs text-blue-400 group-hover:text-blue-300"></i>
                            </div>
                        </button>
                        <button onclick="toggleHideMode()" class="w-full text-right p-3 rounded-xl bg-gray-800/80 hover:bg-gray-700 transition border border-gray-700 hover:border-cyan-500/50 flex justify-between items-center group">
                            <span id="hide-mode-text" class="text-gray-300 group-hover:text-white">تفعيل التسميع الأعمى (إخفاء)</span> 
                            <div class="w-8 h-8 rounded-full bg-cyan-500/20 flex items-center justify-center group-hover:bg-cyan-500/40">
                                <i class="fa-solid fa-eye-slash text-xs text-cyan-400 group-hover:text-cyan-300" id="hide-icon"></i>
                            </div>
                        </button>
                        <button onclick="addManualMistake()" class="w-full text-right p-3 rounded-xl bg-gray-800/80 hover:bg-red-950/40 transition border border-gray-700 hover:border-red-500/50 flex justify-between items-center group">
                            <span class="text-gray-300 group-hover:text-red-200">إرسال الآية للمراجعة عمداً</span> 
                            <div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-bookmark text-xs text-red-400"></i>
                            </div>
                        </button>
                        <audio id="quran-audio" class="hidden"></audio>
                    </div>
                </div>

                <div class="glass-panel p-6 border-l-4 border-l-warning">
                    <h3 class="text-lg font-bold mb-4 flex justify-between items-center">
                        <span><i class="fa-solid fa-triangle-exclamation mr-2 text-warning"></i> آيات للمراجعة</span>
                        <span id="mistakes-badge" class="bg-warning/20 text-warning px-2 py-1 rounded-md text-xs">0 آية</span>
                    </h3>
                    <div id="mistakes-quick-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
                </div>

                <div class="glass-panel p-6">
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-700/50 pb-3"><i class="fa-solid fa-chart-line mr-2 text-success"></i> الإنجاز العام</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-gray-800/60 p-3 rounded-xl text-center border border-gray-700/50 cursor-pointer hover:bg-gray-700 transition" onclick="toggleProgressModal()" title="انقر لعرض التفاصيل">
                            <div class="text-2xl font-bold text-cyan-400" id="stat-surahs">0</div>
                            <div class="text-[10px] text-gray-400 mt-2">سور مكتملة</div>
                        </div>
                        <div class="bg-gray-800/60 p-3 rounded-xl text-center border border-gray-700/50">
                            <div class="text-2xl font-bold text-success" id="stat-verses">0</div>
                            <div class="text-[10px] text-gray-400 mt-2">آية مضبوطة</div>
                        </div>
                        <div class="bg-gray-800/60 p-3 rounded-xl text-center border border-gray-700/50">
                            <div class="text-2xl font-bold text-danger" id="stat-mistakes-total">0</div>
                            <div class="text-[10px] text-gray-400 mt-2">أخطاء متراكمة</div>
                        </div>
                    </div>
                    <!-- زر سجل حفظ السور المضاف -->
                    <button onclick="toggleProgressModal()" class="w-full mt-4 p-3 rounded-xl bg-gradient-to-r from-gray-800 to-gray-700 hover:from-cyan-900/50 hover:to-blue-900/50 transition border border-gray-600 hover:border-cyan-500/50 text-white font-medium flex justify-center items-center gap-2">
                        <i class="fa-solid fa-list-check text-cyan-400"></i> عرض سجل السور والإنجازات
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة الإنجازات المنبثقة -->
    <div id="progress-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="glass-panel p-0 max-w-lg w-full max-h-[85vh] flex flex-col overflow-hidden shadow-2xl shadow-cyan-900/20">
            <div class="p-6 bg-gradient-to-r from-gray-900 to-gray-800 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-white flex items-center"><i class="fa-solid fa-medal mr-3 text-yellow-400 text-2xl"></i> سجل إنجازاتك</h2>
                <button onclick="toggleProgressModal()" class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-gray-300 hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-3 flex-grow bg-gray-900/50" id="progress-list">
                <!-- سيتم تعبئة السجل هنا برمجياً -->
            </div>
        </div>
    </div>

    <script>
        const surahsList = [
            "الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
            "هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج",
            "المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة",
            "الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان",
            "الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن",
            "الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن",
            "الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر",
            "القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين",
            "الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى",
            "الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر",
            "الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"
        ];

        const surahTotalAyahs = [7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,5,6];

        let currentSuraNumber = 101; 
        let currentAyahIndex = 0; 
        let currentSurahData = [];
        let isListening = false;
        let recognition = null;
        let isHiddenMode = false;
        let lockAdvance = false;

        let memorizedStats = JSON.parse(localStorage.getItem('memorizedStats')) || {}; 
        let mistakesData = JSON.parse(localStorage.getItem('mistakesData')) || {}; 

        window.onload = () => {
            const savedSura = localStorage.getItem('bookmark_sura');
            const savedAyah = localStorage.getItem('bookmark_ayah');
            if(savedSura && savedAyah) {
                currentSuraNumber = parseInt(savedSura);
                currentAyahIndex = parseInt(savedAyah);
            }

            populateDropdownList();
            updateGlobalStats();
            loadSurah();
        };

        // دالة تحديث قائمة السور وتلوين المكتمل منها
        function populateDropdownList() {
            const select = document.getElementById('sura-select');
            select.innerHTML = "";
            surahsList.forEach((sura, index) => {
                const suraNum = index + 1;
                const option = document.createElement('option');
                option.value = suraNum;
                
                // فحص ما إذا كانت السورة مكتملة
                let savedInSurah = memorizedStats[suraNum] || 0;
                let isCompleted = savedInSurah >= surahTotalAyahs[index];
                
                if (isCompleted) {
                    option.text = `${suraNum}. سورة ${sura} ✅`;
                    option.style.color = "#10b981"; // لون أخضر
                    option.style.fontWeight = "bold";
                } else {
                    option.text = `${suraNum}. سورة ${sura}`;
                    option.style.color = "white";
                }

                if (suraNum === currentSuraNumber) option.selected = true;
                select.appendChild(option);
            });
        }

        function saveBookmark() {
            localStorage.setItem('bookmark_sura', currentSuraNumber);
            localStorage.setItem('bookmark_ayah', currentAyahIndex);
            alert(`✅ تم حفظ علامة التوقف بنجاح عند سورة ${surahsList[currentSuraNumber-1]} - الآية ${currentAyahIndex+1}`);
        }

        async function loadSurah() {
            const select = document.getElementById('sura-select');
            currentSuraNumber = parseInt(select.value);
            
            if(localStorage.getItem('bookmark_sura') != currentSuraNumber) {
                currentAyahIndex = 0;
            }
            
            document.getElementById('target-ayah').innerText = "جاري تحميل السورة...";
            document.getElementById('progress-bar-fill').style.width = "0%";
            
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${currentSuraNumber}/quran-simple`);
                const data = await response.json();
                if (data.code === 200) {
                    currentSurahData = data.data.ayahs;
                    displayCurrentAyah();
                    renderMistakesList();
                }
            } catch (error) {
                document.getElementById('target-ayah').innerText = "خطأ في الاتصال.";
            }
        }

        function nextSurahDirect() {
            let nextSura = currentSuraNumber + 1;
            if (nextSura > 114) nextSura = 1;
            currentSuraNumber = nextSura;
            document.getElementById('sura-select').value = nextSura;
            localStorage.removeItem('bookmark_sura'); 
            loadSurah();
        }

        function displayCurrentAyah() {
            lockAdvance = false;
            
            // تحديث شريط التقدم المرئي
            let progressPercentage = currentSurahData.length > 0 ? (currentAyahIndex / currentSurahData.length) * 100 : 0;
            document.getElementById('progress-bar-fill').style.width = `${progressPercentage}%`;
            
            if (currentAyahIndex >= currentSurahData.length) {
                document.getElementById('progress-bar-fill').style.width = "100%";
                document.getElementById('target-ayah').innerHTML = "<span class='text-success'>🎉 أتممت السورة بنجاح! تقبل الله منك.</span>";
                document.getElementById('sura-info').innerText = "نهاية السورة";
                document.getElementById('user-speech-output').innerHTML = "تم إكمال السورة، يمكنك الانتقال للسورة التالية.";
                
                // تحديث القائمة المنسدلة لإظهار العلامة الخضراء فور إتمام السورة
                populateDropdownList();
                
                if (isListening) {
                    isListening = false;
                    if(recognition) recognition.stop();
                    document.getElementById('mic-btn').classList.remove('mic-active');
                    document.getElementById('mic-icon').classList.replace('text-white', 'text-gray-400');
                    document.getElementById('mic-status').innerHTML = "<span class='text-success font-bold'>تم إيقاف الميكروفون تلقائياً لانتهاء السورة.</span>";
                }
                return;
            }

            const ayahData = currentSurahData[currentAyahIndex];
            document.getElementById('sura-info').innerText = `سورة ${surahsList[currentSuraNumber-1]} - الآية ${ayahData.numberInSurah} / ${currentSurahData.length}`;
            
            const ayahElement = document.getElementById('target-ayah');
            ayahElement.innerText = ayahData.text;
            
            if(isHiddenMode) ayahElement.classList.add('hidden-ayah');
            else ayahElement.classList.remove('hidden-ayah');
            
            document.getElementById('quran-audio').src = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayahData.number}.mp3`;
            
            document.getElementById('user-speech-output').innerHTML = '<span class="text-gray-500">في انتظار قراءتك...</span>';
            document.getElementById('ayah-container').style.borderColor = "transparent";
            document.getElementById('ayah-container').style.backgroundColor = "transparent";
            
            if(isListening && recognition) {
                recognition.abort(); 
            }
        }

        function changeAyah(step) {
            currentAyahIndex += step;
            if(currentAyahIndex < 0) currentAyahIndex = 0;
            if(currentAyahIndex >= currentSurahData.length) currentAyahIndex = currentSurahData.length - 1;
            displayCurrentAyah();
        }

        function playRealAudio() { 
            const audio = document.getElementById('quran-audio');
            if(isListening) toggleListening(); 
            audio.play(); 
        }
        
        function toggleHideMode() {
            isHiddenMode = !isHiddenMode;
            const icon = document.getElementById('hide-icon');
            displayCurrentAyah();
            
            if(isHiddenMode) {
                document.getElementById('hide-mode-text').innerText = "إلغاء الإخفاء";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                document.getElementById('hide-mode-text').innerText = "تفعيل التسميع الأعمى (إخفاء)";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        function addManualMistake() {
            if(currentAyahIndex >= currentSurahData.length) return;
            const ayahData = currentSurahData[currentAyahIndex];
            if (!mistakesData[currentSuraNumber]) mistakesData[currentSuraNumber] = [];
            if (!mistakesData[currentSuraNumber].includes(ayahData.numberInSurah)) {
                mistakesData[currentSuraNumber].push(ayahData.numberInSurah);
                localStorage.setItem('mistakesData', JSON.stringify(mistakesData));
                updateGlobalStats();
                renderMistakesList();
                alert("تم إرسال الآية الحالية لسجل المراجعة.");
            }
        }

        function normalizeArabic(text) {
            if(!text) return "";
            return text.replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED\u06DF-\u06E8]/g, '') 
                .replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ي/g, 'ى').replace(/ـ/g, '')
                .replace(/ماهيه/g, 'ما هي').replace(/ماهي/g, 'ما هي')
                .replace(/[^\u0621-\u064A\s]/g, '')
                .replace(/\s+/g, ' ').trim();
        }

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("يرجى استخدام متصفح كروم.");
                return;
            }
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false; 
            recognition.interimResults = false; 
            recognition.lang = 'ar-SA';

            recognition.onstart = function() {
                isListening = true;
                document.getElementById('mic-btn').classList.add('mic-active');
                document.getElementById('mic-icon').classList.replace('text-gray-400', 'text-white');
                document.getElementById('mic-status').innerText = "الشيخ يستمع لك الآن...";
            };

            recognition.onresult = function(event) {
                let spokenText = event.results[0][0].transcript;
                document.getElementById('user-speech-output').innerText = spokenText;
                evaluateRecitation(spokenText);
            };

            recognition.onerror = function(event) {
                document.getElementById('user-speech-output').innerHTML = '<span class="text-red-400">حدث تقطع صوتي.. تم تفريغ الذاكرة، أعد القراءة مجدداً</span>';
            };
            
            recognition.onend = function() { 
                if(isListening) {
                    try { recognition.start(); } catch(e) {}
                }
            };
        }

        function toggleListening() {
            if (!recognition) initSpeechRecognition();
            if (isListening) {
                isListening = false;
                if(recognition) recognition.stop();
                document.getElementById('mic-btn').classList.remove('mic-active');
                document.getElementById('mic-icon').classList.replace('text-white', 'text-gray-400');
                document.getElementById('mic-status').innerText = "الميكروفون متوقف.";
            } else {
                document.getElementById('user-speech-output').innerText = "";
                recognition.start();
            }
        }

        function evaluateRecitation(spokenText) {
            if(currentAyahIndex >= currentSurahData.length || lockAdvance) return;

            const ayahData = currentSurahData[currentSurahData.length ? currentAyahIndex : 0];
            const cleanTarget = normalizeArabic(ayahData.text);
            const cleanSpoken = normalizeArabic(spokenText);

            if (cleanSpoken.length === 0) return;

            if (cleanSpoken.includes(cleanTarget) || cleanTarget.includes(cleanSpoken) || cleanSpoken === cleanTarget) {
                lockAdvance = true; 
                document.getElementById('user-speech-output').innerHTML = `<span class="word-correct"><i class="fa-solid fa-check-double mr-2"></i> ${spokenText}</span>`;
                document.getElementById('ayah-container').style.borderColor = "#10b981";
                document.getElementById('mic-status').innerHTML = "<span class='text-success font-bold'>قراءة صحيحة وممتازة!</span>";
                
                if (!memorizedStats[currentSuraNumber]) memorizedStats[currentSuraNumber] = 0;
                
                // زيادة العداد فقط إذا لم تتجاوز الآيات الكلية للسورة
                if(memorizedStats[currentSuraNumber] < currentSurahData.length) {
                    memorizedStats[currentSuraNumber]++;
                    localStorage.setItem('memorizedStats', JSON.stringify(memorizedStats));
                }
                
                if (mistakesData[currentSuraNumber] && mistakesData[currentSuraNumber].includes(ayahData.numberInSurah)) {
                    mistakesData[currentSuraNumber] = mistakesData[currentSuraNumber].filter(n => n !== ayahData.numberInSurah);
                    localStorage.setItem('mistakesData', JSON.stringify(mistakesData));
                }

                updateGlobalStats();

                setTimeout(() => {
                    currentAyahIndex++;
                    displayCurrentAyah();
                }, 1500); 
            } else {
                document.getElementById('mic-status').innerHTML = "<span class='text-warning font-bold'>🔄 لم تتطابق تماماً، تم مسح الذاكرة العشوائية.. أعد المحاولة.</span>";
                
                if (!mistakesData[currentSuraNumber]) mistakesData[currentSuraNumber] = [];
                if (!mistakesData[currentSuraNumber].includes(ayahData.numberInSurah)) {
                    mistakesData[currentSuraNumber].push(ayahData.numberInSurah);
                    localStorage.setItem('mistakesData', JSON.stringify(mistakesData));
                    updateGlobalStats();
                    renderMistakesList();
                }
            }
        }

        function updateGlobalStats() {
            let totalSavedVerses = 0; let totalSavedSurahs = 0;
            let totalMistakes = 0;
            
            for (let i = 1; i <= 114; i++) {
                let savedInSurah = memorizedStats[i] || 0; 
                // تأكد من أن عدد الآيات المحفوظة لا يتجاوز العدد الفعلي للسورة بصرياً
                totalSavedVerses += Math.min(savedInSurah, surahTotalAyahs[i - 1]); 
                if (savedInSurah >= surahTotalAyahs[i - 1]) totalSavedSurahs++;
            }
            
            for (let sura in mistakesData) totalMistakes += mistakesData[sura].length;

            document.getElementById('stat-surahs').innerText = totalSavedSurahs;
            document.getElementById('stat-verses').innerText = totalSavedVerses;
            document.getElementById('stat-mistakes-total').innerText = totalMistakes;
        }

        function renderMistakesList() {
            const listContainer = document.getElementById('mistakes-quick-list');
            const badge = document.getElementById('mistakes-badge');
            
            listContainer.innerHTML = "";
            let currentSuraMistakes = mistakesData[currentSuraNumber] || [];
            
            badge.innerText = `${currentSuraMistakes.length} آية`;
            
            if (currentSuraMistakes.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center p-4 bg-gray-800/50 rounded-lg border border-gray-700/50">
                        <i class="fa-solid fa-check-circle text-success text-2xl mb-2"></i>
                        <p class="text-gray-400 text-sm">ممتاز! لا توجد تنبيهات نشطة في هذه السورة.</p>
                    </div>`;
                return;
            }

            currentSuraMistakes.sort((a,b)=>a-b).forEach(ayahNum => {
                const btn = document.createElement('button');
                btn.className = "w-full text-right p-3 bg-gray-800/90 hover:bg-gray-700 border border-warning/30 hover:border-warning rounded-lg transition flex justify-between items-center group";
                btn.innerHTML = `
                    <span class="text-gray-200">الآية رقم ${ayahNum}</span>
                    <span class="text-xs bg-warning/20 text-warning px-2 py-1 rounded group-hover:bg-warning group-hover:text-black transition">انتقل إليها <i class="fa-solid fa-arrow-left mr-1"></i></span>
                `;
                btn.onclick = () => {
                    currentAyahIndex = ayahNum - 1;
                    displayCurrentAyah();
                };
                listContainer.appendChild(btn);
            });
        }

        // دالة فتح نافذة الإنجازات وإظهار السور المكتملة
        function toggleProgressModal() {
            const modal = document.getElementById('progress-modal');
            const list = document.getElementById('progress-list');
            
            if(modal.classList.contains('hidden')) {
                list.innerHTML = "";
                let hasData = false;
                
                // تجميع البيانات لترتيبها وعرضها
                let achievements = [];
                for(let sura in memorizedStats) {
                    achievements.push({
                        suraNum: parseInt(sura),
                        savedCount: memorizedStats[sura],
                        totalAyahs: surahTotalAyahs[sura - 1],
                        mistakesCount: mistakesData[sura] ? mistakesData[sura].length : 0
                    });
                }
                
                // فرز القائمة: المكتملة أولاً ثم القيد الحفظ
                achievements.sort((a, b) => {
                    let aComplete = a.savedCount >= a.totalAyahs ? 1 : 0;
                    let bComplete = b.savedCount >= b.totalAyahs ? 1 : 0;
                    if(bComplete !== aComplete) return bComplete - aComplete;
                    return a.suraNum - b.suraNum; // ترتيب تصاعدي حسب رقم السورة
                });

                achievements.forEach(item => {
                    hasData = true;
                    let isPerfect = item.savedCount >= item.totalAyahs;
                    let displayedSaved = Math.min(item.savedCount, item.totalAyahs); // لعدم تجاوز الحد
                    
                    let mBadge = item.mistakesCount > 0 
                        ? `<span class="bg-warning/20 text-warning px-2 py-1 rounded text-xs ml-2">${item.mistakesCount} مراجعة</span>` 
                        : (isPerfect ? `<span class="bg-success/20 text-success px-2 py-1 rounded text-xs ml-2 font-bold"><i class="fa-solid fa-check"></i> مكتملة </span>` : `<span class="bg-gray-700 text-gray-300 px-2 py-1 rounded text-xs ml-2">قيد الحفظ</span>`);
                    
                    let div = document.createElement('div');
                    // تمييز خلفية السورة المكتملة لتبدو أجمل
                    div.className = `p-4 rounded-xl flex justify-between items-center border transition ${isPerfect ? 'bg-gradient-to-r from-emerald-900/40 to-gray-800 border-emerald-700/50' : 'bg-gray-800 border-gray-700/50 hover:bg-gray-700'}`;
                    div.innerHTML = `
                        <div class="flex items-center">
                            <span class="w-8 h-8 rounded-full ${isPerfect ? 'bg-emerald-600 text-white' : 'bg-cyan-900/50 text-cyan-400'} flex items-center justify-center font-bold text-sm ml-3">${item.suraNum}</span>
                            <span class="font-bold text-gray-200">سورة ${surahsList[item.suraNum-1]}</span>
                        </div> 
                        <div class="text-left flex items-center">
                            <span class="text-gray-400 text-sm ml-2">${displayedSaved} / ${item.totalAyahs} آية</span>
                            ${mBadge}
                        </div>
                    `;
                    list.appendChild(div);
                });
                
                if(!hasData) list.innerHTML = "<div class='text-center py-8 text-gray-500'><i class='fa-solid fa-seedling text-4xl mb-3'></i><p>ابدأ رحلة الحفظ المباركة لتظهر إنجازاتك هنا.</p></div>";
            }
            modal.classList.toggle('hidden');
        }
    </script>
